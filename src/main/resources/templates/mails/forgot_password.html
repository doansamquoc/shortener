<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
</head>
<body>
<h4>Hi, <span th:text="${username}">User</span>!</h4>
<p>We received a password reset request.</p>
<p>Below is the code to reset your password, the code will expire after 15 minutes.</p>
<h1 th:text="${code}">012345</h1>
<p>If you are not making this request, simply ignore this message.</p>
</body>
</html>
