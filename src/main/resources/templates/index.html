<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8"/>
    <link href="../static/css/css.css" rel="stylesheet"/>
    <link
            crossorigin="anonymous"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            rel="stylesheet"
    />
    <title th:text="${title}">Shortener - URL Shortener</title>
</head>
<body>
<header>
    <h1>URL Shortener Demo</h1>
    <span>This is demo. Visit API docs or source code</span>
</header>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <form id="shorten-form">
                        <div class="col-md-6">
                            <input class="form-control" required type="text"/>
                            <div class="invalid-feedback">Please provide a valid city.</div>
                        </div>
                        <button class="btn btn-primary w-100 d-flex align-items-center justify-content-center"
                                id="submit-btn" type="submit">
                            <span id="btn-text">Shorten</span>
                            <div class="d-none align-items-center gap-2" id="btn-spinner">
                                <span aria-hidden="true" class="spinner-border spinner-border-sm"></span>
                                <span>Đang xử lý...</span>
                            </div>
                        </button>
                        <button class="btn btn-primary" disabled type="button">
                            <span aria-hidden="true" class="spinner-border spinner-border-sm"></span>
                            <span role="status">Loading...</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/script.js}"></script>
<script src="../static/js/script.js"></script>
<script
        crossorigin="anonymous"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
></script>
<script
        crossorigin="anonymous"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
></script>
<script
        crossorigin="anonymous"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
></script>
</body>
</html>
