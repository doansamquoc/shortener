<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shortener - URL Shortener</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            text-decoration: none;
        }

        body {
            font-family: monospace;
        }

        header {
            padding: 16px;
            color: white;
            background-color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input {
            font-size: 24px;
            padding: 16px;
            border: none;
            background: #eeeeee;
            outline: none;
            font-family: inherit;
        }

        button {
            font-size: 24px;
            padding: 8px;
            background: dodgerblue;
            border: none;
            color: white;
            font-family: inherit;
        }
    </style>
</head>
<body>
<header>
    <h1>URL Shortener Demo</h1>
    <span>This is demo. Visit API docs or source code</span>
</header>
<div class="container">
    <h1 style="text-align: center">URL Shortener</h1>
    <form>
        <input type="url" id="url" placeholder="Enter link to shorten">
        <button>Shorten URL</button>
    </form>

    <form action="">
        <h1>Result</h1>
        <input type="url" id="result" placeholder="Enter link to shorten" readonly>
        <button>Copy Shortened URL</button>
    </form>
</div>
</body>
</html>
