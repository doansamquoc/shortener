spring:
  application:
    name: Shortener
    version: 0.0.1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cache:
    type: redis

  datasource:
    url: jdbc:postgresql://${DB_URL:localhost:5432/shortener}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  springdoc:
    api-docs:
      path: /v3/api-docs
      enabled: true
    swagger-ui:
      enabled: true

app:
  secret-key: ${SECRET_KEY}