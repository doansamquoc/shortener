spring:
  application:
    name: Shortener
    version: 0.0.1

  data:
    redis:
      host: ${REDIS_HOST}
      password: ${REDIS_PASSWORD}
      port: ${REDIS_PORT}
      ssl:
        enabled: true

  cache:
    type: redis

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 50

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

# SpringDoc OpenAPI/Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    enabled: true

# Application configuration properties
app:
  secret-key: ${SECRET_KEY}
  cleanup-urls-after-days: 30

  # Token second * minute * hour * day
  access-token-expiration: 900000 # 15 minutes
  refresh-token-expiration: 1296000000 # 15 days

  auth-code-expiration: 60000 # 60 seconds

  frontend-redirect-url: http://localhost:5173/oauth2/redirect

  # SpringDoc-OpenAPI
  spring-doc:
    title: Shortener API Document
    description: URL Shortener API Built By Sam
    prod-server: https://shortener-wz64.onrender.com
    version: 0.0.1
